version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: driftcache-postgres
    environment:
      POSTGRES_USER: driftcache
      POSTGRES_PASSWORD: driftcache_password
      POSTGRES_DB: driftcache
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - driftcache-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftcache"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: driftcache-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - driftcache-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftcache-backend
    environment:
      - POSTGRES_USER=driftcache
      - POSTGRES_PASSWORD=driftcache_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=driftcache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - driftcache-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: driftcache-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - driftcache-network
    environment:
      - VITE_API_URL=http://localhost:8000

networks:
  driftcache-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
