services:
  # Main FastAPI Backend
  - type: web
    name: driftcache-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driftcache-db
          property: connectionString
      - key: REDIS_HOST
        sync: false  # Set manually after creating Redis instance
      - key: REDIS_PORT
        sync: false  # Set manually after creating Redis instance
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
    autoDeploy: true

databases:
  # PostgreSQL Database
  - name: driftcache-db
    databaseName: driftcache
    user: driftcache
    plan: starter
    region: oregon

# Redis is configured as a separate service type, not a database
# Note: Render's native Redis support via YAML is limited
# You may need to use an external Redis provider or add Redis via dashboard
